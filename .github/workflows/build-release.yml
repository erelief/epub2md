name: Build Portable Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set version from tag
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Download Python embeddable package
        shell: pwsh
        run: |
          $url = 'https://www.python.org/ftp/python/3.11.9/python-3.11.9-embed-amd64.zip'
          Invoke-WebRequest $url -OutFile python-embed.zip
          Expand-Archive python-embed.zip -DestinationPath build/python

      - name: Configure embedded Python
        shell: pwsh
        run: |
          # Enable site-packages in embedded Python
          $pth = 'build/python/python311._pth'
          $content = Get-Content $pth -Raw
          $content = $content.Replace('#import site', 'import site')
          Set-Content $pth $content

          # Install pip
          Invoke-WebRequest https://bootstrap.pypa.io/get-pip.py -OutFile build/python/get-pip.py
          & build/python/python.exe build/python/get-pip.py --no-warn-script-location
          Remove-Item build/python/get-pip.py

      - name: Install dependencies
        shell: pwsh
        run: |
          & build/python/python.exe -m pip install html2text>=2020.1.16 --no-warn-script-location

      - name: Assemble portable package
        shell: pwsh
        run: |
          $pkgDir = "epub2md-${{ env.VERSION }}-portable"

          New-Item -ItemType Directory -Path $pkgDir

          # Embedded Python
          Copy-Item -Recurse build/python $pkgDir/python

          # Source code
          Copy-Item -Recurse epub_converter $pkgDir/epub_converter
          Copy-Item -Recurse md_merger $pkgDir/md_merger

          # Portable bat launchers
          Copy-Item epub_converter.bat $pkgDir/epub_converter.bat
          Copy-Item merge_md.bat $pkgDir/merge_md.bat

          # README
          Copy-Item README.md $pkgDir/README.md

          # Create portable README
          @"
          epub2md v${{ env.VERSION }} Portable
          ========================================

          No Python installation required. Just extract and run.

          Usage:
            Double-click epub_converter.bat  -  Convert EPUB to Markdown
            Double-click merge_md.bat        -  Merge Markdown files

          You can also drag and drop files onto the bat scripts.
          "@ | Set-Content $pkgDir/README-portable.txt -Encoding UTF8

      - name: Create zip archive
        shell: pwsh
        run: |
          Compress-Archive -Path "epub2md-${{ env.VERSION }}-portable" `
            -DestinationPath "epub2md-${{ env.VERSION }}-portable.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: epub2md-${{ env.VERSION }}-portable.zip
          generate_release_notes: true
